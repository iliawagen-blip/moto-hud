# Еженедельный снапшот камер OSM (Москва) → data/cameras-moscow.json
name: Cameras snapshot (Moscow)

on:
  schedule:
    # Понедельник 04:20 UTC
    - cron: '20 4 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cameras-snapshot
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch Overpass → data/cameras-moscow.json
        run: node scripts/fetch-cameras-snapshot.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cameras-moscow.json
          if git diff --staged --quiet; then
            echo "No camera snapshot changes"
          else
            git commit -m "data(cameras): refresh Moscow OSM snapshot"
            git push
          fi
