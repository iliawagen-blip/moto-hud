# Deprecated: use osm-snapshots.yml
name: Cameras snapshot (Moscow) [legacy]

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: node scripts/fetch-osm-snapshots.mjs --region moscow --layers cameras
      - run: node scripts/fetch-osm-snapshots.mjs --legacy-moscow
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/regions/moscow/cameras.json data/cameras-moscow.json
          if git diff --staged --quiet; then echo "no changes"; else
            git commit -m "data(cameras): refresh Moscow OSM snapshot"
            git push
          fi
